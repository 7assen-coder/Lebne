# Render Blueprint — free web service for crowd API (Neon Postgres external).
# Dashboard: New → Blueprint → connect this repo, or create Web Service manually.
services:
  - type: web
    name: lebne-api
    runtime: python
    plan: free
    region: frankfurt
    repo: https://github.com/7assen-coder/Lebne
    branch: main
    buildCommand: pip install --upgrade pip && pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 30 --limit-concurrency 200
    healthCheckPath: /health
    envVars:
      - key: LEBNE_ENV
        value: production
      - key: LEBNE_CROWD_SURFACE_ONLY
        value: "true"
      - key: LEBNE_CONTRIB_LEGACY_ENABLED
        value: "false"
      - key: LEBNE_EMBEDDING_BACKEND
        value: hash
      - key: LEBNE_SESSION_BACKEND
        value: memory
      - key: LEBNE_RATE_LIMIT_REQUESTS
        value: "240"
      - key: LEBNE_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: LEBNE_CROWD_AUTH_RATE_LIMIT
        value: "60"
      - key: LEBNE_CROWD_STT_RATE_LIMIT
        value: "60"
      - key: LEBNE_CORS_ORIGINS
        value: https://lebne.vercel.app
      - key: LEBNE_PUBLIC_BASE_URL
        sync: false
      - key: LEBNE_JWT_SECRET
        generateValue: true
      - key: LEBNE_DATABASE_URL
        sync: false
      - key: LEBNE_CONTRIB_DATABASE_URL
        sync: false
