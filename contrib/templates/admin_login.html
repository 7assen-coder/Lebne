{% extends "base.html" %}
{% block title %}Lebne · Admin{% endblock %}
{% block body %}
<header class="brand-block compact">
  <p class="brand">Lebne</p>
  <h1>Review login</h1>
  <p class="lede">Admin only — approve Mauritanian rewrites before they enter fine-tune files.</p>
</header>
<form class="rewrite-form narrow" method="post" action="/admin/contrib/login">
  {% if error %}<p class="toast error">{{ error }}</p>{% endif %}
  <label class="field">
    <span>Password</span>
    <input type="password" name="password" required autocomplete="current-password" />
  </label>
  <button type="submit" class="btn primary">Enter</button>
</form>
<p class="foot"><a href="/contrib/">← Back to contribute</a></p>
{% endblock %}
