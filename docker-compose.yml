services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${LEBNE_API_PORT:-8000}:8000"
    environment:
      LEBNE_ENV: development
      LEBNE_QDRANT_URL: http://qdrant:6333
      LEBNE_REDIS_URL: redis://redis:6379/0
      LEBNE_SESSION_BACKEND: memory
      LEBNE_BACKEND_API_BASE_URL: http://api:8000
      LEBNE_WALLET_INTERNAL_MODE: "true"
      LEBNE_DATABASE_URL: postgresql+psycopg://lebne:lebne@postgres:5432/lebne
      LEBNE_CONTRIB_DATABASE_URL: postgresql+psycopg://lebne:lebne@postgres:5432/lebne
      LEBNE_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      LEBNE_JWT_SECRET: ${LEBNE_JWT_SECRET:-CHANGE_ME_DEV_ONLY_lebne_jwt_secret_32b}
      LEBNE_ADMIN_BOOTSTRAP_EMAIL: ${LEBNE_ADMIN_BOOTSTRAP_EMAIL:-}
      LEBNE_CONTRIB_LEGACY_ENABLED: ${LEBNE_CONTRIB_LEGACY_ENABLED:-false}
      LEBNE_PUBLIC_BASE_URL: http://localhost:8000
      # Optional local LLM via host Ollama:
      LEBNE_LLM_PROVIDER: ${LEBNE_LLM_PROVIDER:-ollama}
      LEBNE_LLM_BASE_URL: ${LEBNE_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LEBNE_LLM_MODEL: ${LEBNE_LLM_MODEL:-qwen2.5:3b}
      LEBNE_EMBEDDING_BACKEND: ${LEBNE_EMBEDDING_BACKEND:-hash}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
      - crowd_media:/app/media
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  # One-shot: docker compose run --rm seed
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LEBNE_DATABASE_URL: postgresql+psycopg://lebne:lebne@postgres:5432/lebne
      LEBNE_CONTRIB_DATABASE_URL: postgresql+psycopg://lebne:lebne@postgres:5432/lebne
      LEBNE_EMBEDDING_BACKEND: hash
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/seed_contrib_queue.py"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lebne
      POSTGRES_PASSWORD: lebne
      POSTGRES_DB: lebne
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lebne -d lebne"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  keycloak:
    profiles: ["idp"]
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import

  vllm:
    profiles: ["llm"]
    image: vllm/vllm-openai:latest
    ports:
      - "8001:8000"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - ${LEBNE_MODEL_PATH:-./models}:/models
    command:
      - "--model"
      - "/models/lebne-qwen2.5-3b"
      - "--served-model-name"
      - "lebne-qwen2.5-3b"
      - "--dtype"
      - "auto"
      - "--max-model-len"
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

volumes:
  qdrant_storage:
  redis_data:
  postgres_data:
  crowd_media:
